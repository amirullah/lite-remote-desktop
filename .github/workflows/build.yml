name: Build & Package

# Builds the Windows binaries and a one-click installer. Because WPF/WinForms only build on
# Windows, this runs on a Windows runner. Every run uploads artifacts; pushing a tag like v1.0.0
# additionally publishes a GitHub Release with the installer attached (a permanent public download).

on:
  push:
    branches: [ main, "claude/**" ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publish a Release with this tag (e.g. v1.0.0). Leave empty for a CI-only build."
        required: false
        default: ""

permissions:
  contents: write   # needed to create Releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RemoteDesktop.sln

      # Self-contained single-file so users can run without installing the .NET runtime.
      - name: Publish viewer (client)
        run: >
          dotnet publish src/RemoteDesktop.Client/RemoteDesktop.Client.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true -p:DebugType=none
          -o publish/client

      # The in-app split-tunnel VPN ships a hidden OpenVPN engine. Fetch the OFFICIAL signed binaries
      # (OpenVPN Inc. + WireGuard LLC), verify their Authenticode signatures, and drop them next to the
      # viewer so the packaged installer/zip actually include the VPN engine (matches build-installer.ps1).
      # Without this, public downloads are ~7-8 MB smaller and the "Connect through VPN" feature is dead.
      - name: Bundle OpenVPN engine (split-tunnel VPN)
        shell: pwsh
        run: |
          $cache = "publish/client/openvpn"
          New-Item -ItemType Directory -Force $cache | Out-Null
          $tmp = Join-Path $env:RUNNER_TEMP ("ovpn-" + [guid]::NewGuid().ToString("N"))
          New-Item -ItemType Directory -Force $tmp | Out-Null
          $msi = Join-Path $tmp "openvpn.msi"
          Write-Host "Downloading OpenVPN 2.7.5 (official signed MSI)…"
          Invoke-WebRequest "https://build.openvpn.net/downloads/releases/OpenVPN-2.7.5-I001-amd64.msi" -OutFile $msi -UseBasicParsing -TimeoutSec 300
          $s = Get-AuthenticodeSignature $msi
          if ($s.Status -ne 'Valid' -or $s.SignerCertificate.Subject -notmatch 'OpenVPN') { throw "OpenVPN MSI signature not trusted ($($s.Status))." }
          $ext = Join-Path $tmp "ext"
          Start-Process msiexec.exe -ArgumentList "/a","`"$msi`"","TARGETDIR=`"$ext`"","/qn" -Wait
          $bin = Join-Path $ext "OpenVPN\bin"
          foreach ($n in "openvpn.exe","libssl-3-x64.dll","libcrypto-3-x64.dll","libpkcs11-helper-1.dll","vcruntime140.dll","openvpnserv.exe","tapctl.exe") {
            Copy-Item (Join-Path $bin $n) $cache -Force
          }
          $wz = Join-Path $tmp "wintun.zip"
          Write-Host "Downloading wintun 0.14.1 (official)…"
          Invoke-WebRequest "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile $wz -UseBasicParsing -TimeoutSec 180
          Expand-Archive $wz -DestinationPath (Join-Path $tmp "wt") -Force
          $wt = Get-ChildItem (Join-Path $tmp "wt") -Recurse -Filter wintun.dll | Where-Object { $_.DirectoryName -match "amd64" } | Select-Object -First 1
          $ws = Get-AuthenticodeSignature $wt.FullName
          if ($ws.Status -ne 'Valid' -or $ws.SignerCertificate.Subject -notmatch 'WireGuard') { throw "wintun.dll signature not trusted ($($ws.Status))." }
          Copy-Item $wt.FullName $cache -Force
          Write-Host "Bundled engine:"; Get-ChildItem $cache | ForEach-Object { "  $($_.Name)  $([math]::Round($_.Length/1MB,2)) MB" }

      - name: Publish host (tray)
        run: >
          dotnet publish src/RemoteDesktop.Host/RemoteDesktop.Host.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true -p:DebugType=none
          -o publish/host

      # The relay is a tiny server component — publish it for both Linux (typical VPS) and Windows.
      - name: Publish relay (Linux)
        run: >
          dotnet publish src/RemoteDesktop.Relay/RemoteDesktop.Relay.csproj
          -c Release -r linux-x64 --self-contained true
          -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:DebugType=none
          -o publish/relay-linux

      - name: Publish relay (Windows)
        run: >
          dotnet publish src/RemoteDesktop.Relay/RemoteDesktop.Relay.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:DebugType=none
          -o publish/relay-win

      - name: Derive version
        id: ver
        shell: pwsh
        run: |
          $tagInput = '${{ github.event.inputs.release_tag }}'
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace 'refs/tags/v','' }
               elseif ($tagInput -ne '') { $tagInput -replace '^v','' }
               else { "1.0.0-ci.$env:GITHUB_RUN_NUMBER" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        working-directory: installer
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          "/DAppVersion=${{ steps.ver.outputs.version }}" LiteRemote.iss

      - name: Zip portable binaries
        shell: pwsh
        run: |
          Compress-Archive -Path publish/client/* -DestinationPath "LiteRemote-Viewer-${{ steps.ver.outputs.version }}.zip"
          Compress-Archive -Path publish/host/*   -DestinationPath "LiteRemote-Host-${{ steps.ver.outputs.version }}.zip"
          Compress-Archive -Path publish/relay-linux/* -DestinationPath "LiteRemote-Relay-linux-${{ steps.ver.outputs.version }}.zip"
          Compress-Archive -Path publish/relay-win/*   -DestinationPath "LiteRemote-Relay-win-${{ steps.ver.outputs.version }}.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LiteRemote-${{ steps.ver.outputs.version }}
          path: |
            installer/output/*.exe
            LiteRemote-*.zip
          if-no-files-found: error

      - name: Publish Release (on tag or manual dispatch with release_tag)
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          # On manual dispatch the tag doesn't exist yet — softprops creates it at this commit.
          tag_name: v${{ steps.ver.outputs.version }}
          files: |
            installer/output/*.exe
            LiteRemote-*.zip
          generate_release_notes: true

  # Mac Catalyst viewer — MAUI's maccatalyst target only builds on macOS, so it runs on a macOS runner.
  # Produces an UNSIGNED .app (sideload with right-click → Open past Gatekeeper); notarization would need
  # an Apple Developer account. Runs in parallel with the Windows job; on a tag it attaches the zip.
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI (Mac Catalyst)
        run: dotnet workload install maui-maccatalyst

      - name: Build Mac Catalyst app (unsigned)
        run: >
          dotnet build src/RemoteDesktop.Maui/RemoteDesktop.Maui.csproj
          -f net8.0-maccatalyst -c Release
          -p:CreatePackage=false -p:CodesignKey= -p:EnableCodeSigning=false

      - name: Derive version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then V="${GITHUB_REF#refs/tags/v}";
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then V="${{ github.event.inputs.release_tag }}"; V="${V#v}";
          else V="1.0.0-ci.$GITHUB_RUN_NUMBER"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Zip .app
        run: |
          APP=$(find src/RemoteDesktop.Maui/bin/Release/net8.0-maccatalyst -name "*.app" -type d | head -1)
          echo "app bundle: $APP"
          if [ -z "$APP" ]; then echo "No .app produced"; exit 1; fi
          ditto -c -k --sequesterRsrc --keepParent "$APP" "LiteRemote-Viewer-Mac-${{ steps.ver.outputs.version }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteRemote-Mac-${{ steps.ver.outputs.version }}
          path: LiteRemote-Viewer-Mac-*.zip
          if-no-files-found: error

      - name: Attach to Release (on tag or manual dispatch)
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          files: LiteRemote-Viewer-Mac-*.zip
